<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>동영상 플레이어</title>
<style>
  /* Milray Park 토큰과 동일 값(독립 HTML이라 변수로 복제) — 임의 색 추가 없음 */
  :root {
    --bg: #F8F7F2;
    --bg-deep: #F1EEE6;
    --surface: #FFFFFF;
    --border: #E7E0D4;
    --fg: #141311;
    --fg-2: #56524B;
    --fg-muted: #8C887F;
    --accent: #F2733E;
    --accent-hover: #E5602B;
    --font-sans: 'Pretendard', 'Hanken Grotesk', -apple-system, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex;
    flex-direction: column;
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--fg);
  }

  /* ── 상단: 파일 선택 — 평소엔 숨김(보드에선 화면만 보인다).
        보드 카드가 호버/선택 시 kvSetChrome으로 연다.
        position:absolute 오버레이라 나타나도 영상(.stage)을 밀어내지 않는다
        (호버 시 영상이 위아래로 튀던 문제 해결 — 영상 화면은 항상 고정). ── */
  header {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 6;
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  body.chrome:not(.present) header { display: flex; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border: 0;
    border-radius: 999px;
    background: var(--accent);
    color: #fff;
    font: 600 13px var(--font-sans);
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { background: var(--accent-hover); }
  #name {
    flex: 1;
    overflow: hidden;
    font-size: 12px;
    color: var(--fg-muted);
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .icon-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    width: 30px;
    height: 30px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--surface);
    color: var(--fg-2);
    font-size: 14px;
    cursor: pointer;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── 가운데: 영상 ─────────────────────────────────────────────── */
  .stage { position: relative; flex: 1; display: flex; min-height: 0; background: var(--bg-deep); }
  video {
    flex: 1;
    width: 100%;
    height: 100%;
    min-height: 0;
    object-fit: contain;
    background: transparent;
    display: none;
  }
  body.loaded video { display: block; }
  #empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: var(--fg-muted);
    font-size: 13px;
    pointer-events: none;
  }
  #empty .clap { font-size: 34px; }
  body.loaded #empty { display: none; }
  .stage.dropping::after {
    content: '여기에 놓으면 재생돼요';
    position: absolute;
    inset: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px dashed var(--accent);
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.6);
    color: var(--accent);
    font: 600 13px var(--font-sans);
    pointer-events: none;
  }

  /* 중앙 큰 재생 버튼 — 일시정지 상태에서만 */
  #bigPlay {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 58px;
    height: 58px;
    border: 0;
    border-radius: 999px;
    background: rgba(20, 19, 17, 0.55);
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
    transition: background 150ms ease, transform 150ms ease;
  }
  #bigPlay:hover { background: var(--accent); transform: translate(-50%, -50%) scale(1.06); }
  body.loaded.paused #bigPlay { display: inline-flex; }

  /* ── 하단 컨트롤 바 — 심플한 필 ──────────────────────────────── */
  #controls {
    position: absolute;
    left: 50%;
    bottom: 10px;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    gap: 8px;
    width: min(calc(100% - 24px), 560px);
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(6px);
    box-shadow: 0 4px 14px rgba(20, 19, 17, 0.10);
  }
  /* 하단 컨트롤 바 — 평소엔 숨김, 호버/선택(chrome) 시에만 나타난다(헤더와 동일). */
  body.loaded.chrome #controls { display: flex; }
  #controls button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    flex: 0 0 auto;
    border: 0;
    border-radius: 999px;
    background: transparent;
    color: var(--fg-2);
    font-size: 13px;
    cursor: pointer;
  }
  #controls button:hover { background: var(--bg-deep); color: var(--accent); }
  #controls button.on { color: var(--accent); }
  #seek {
    flex: 1;
    min-width: 0;
    height: 4px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  #time {
    flex: 0 0 auto;
    font-size: 10.5px;
    font-variant-numeric: tabular-nums;
    color: var(--fg-muted);
    white-space: nowrap;
  }

  /* ── 프레젠테이션(수업) 모드 — 메뉴 숨김 → 보드 위에 영상만 ──────── */
  #exit { position: absolute; top: 8px; right: 8px; display: none; z-index: 10; opacity: 0.55; }
  #exit:hover { opacity: 1; }
  body.present { background: transparent; }
  body.present header { display: none; }
  body.present .stage { background: transparent; }
  body.present #exit { display: inline-flex; }
</style>
</head>
<body class="paused">
  <header>
    <label class="btn">
      파일 선택
      <input id="file" type="file" accept="video/*" hidden />
    </label>
    <span id="name">동영상 파일을 선택하세요 (mp4 · webm 등)</span>
    <button id="fs" class="icon-btn" type="button" title="전체 화면 (수업용 — 메뉴 숨기고 영상만)">⛶</button>
  </header>

  <div class="stage" id="stage">
    <video id="v" playsinline></video>
    <div id="empty">
      <span class="clap">🎬</span>
      <span>마우스를 올리면 파일 선택 줄이 열려요</span>
    </div>
    <button id="bigPlay" type="button" title="재생">▶</button>
    <div id="controls">
      <button id="play" type="button" title="재생/일시정지">▶</button>
      <input id="seek" type="range" min="0" max="1000" value="0" />
      <span id="time">0:00 / 0:00</span>
      <button id="mute" type="button" title="음소거">🔊</button>
      <button id="loop" type="button" title="반복 재생">🔁</button>
    </div>
    <button id="exit" class="icon-btn" type="button" title="프레젠테이션 종료">✕</button>
  </div>

  <script>
    const v = document.getElementById('v');
    const file = document.getElementById('file');
    const nameEl = document.getElementById('name');
    const stage = document.getElementById('stage');
    const playBtn = document.getElementById('play');
    const bigPlay = document.getElementById('bigPlay');
    const seek = document.getElementById('seek');
    const timeEl = document.getElementById('time');
    const muteBtn = document.getElementById('mute');
    const loopBtn = document.getElementById('loop');
    let objectUrl = null;
    let seeking = false;

    function loadFile(f) {
      if (!f || !f.type.startsWith('video/')) return;
      if (objectUrl) URL.revokeObjectURL(objectUrl);
      objectUrl = URL.createObjectURL(f);
      nameEl.textContent = f.name;
      v.src = objectUrl;
      document.body.classList.add('loaded');
      v.play().catch(() => { /* 자동재생 차단 시 — 중앙 ▶로 시작 */ });
    }
    file.addEventListener('change', (e) => loadFile(e.target.files && e.target.files[0]));

    // 드래그&드롭 — 보드에서 쓰듯 파일을 끌어다 놓으면 바로 재생.
    ['dragenter', 'dragover'].forEach((t) =>
      stage.addEventListener(t, (e) => { e.preventDefault(); stage.classList.add('dropping'); }));
    ['dragleave', 'drop'].forEach((t) =>
      stage.addEventListener(t, (e) => { e.preventDefault(); stage.classList.remove('dropping'); }));
    stage.addEventListener('drop', (e) => loadFile(e.dataTransfer && e.dataTransfer.files[0]));

    /* ── 컨트롤 ── */
    const toggle = () => { if (v.paused) v.play(); else v.pause(); };
    playBtn.addEventListener('click', toggle);
    bigPlay.addEventListener('click', toggle);
    v.addEventListener('click', toggle);
    // 보드 카드(부모)가 재생/일시정지 상태를 알 수 있게 알린다 — 카드 위 '재생/정지'
    // 버튼(드래그 레이어보다 위)이 이 상태로 아이콘을 동기화하고 kvTogglePlay로 조작한다.
    const postState = () => {
      try {
        window.parent && window.parent.postMessage(
          { type: 'kv-video-playing', playing: !v.paused, ready: document.body.classList.contains('loaded') },
          '*',
        );
      } catch { /* standalone */ }
    };
    v.addEventListener('play', () => { document.body.classList.remove('paused'); playBtn.textContent = '⏸'; postState(); });
    v.addEventListener('pause', () => { document.body.classList.add('paused'); playBtn.textContent = '▶'; postState(); });
    // 외부(보드 카드)에서 재생/일시정지 토글 — 카드 위 버튼이 호출한다.
    window.kvTogglePlay = toggle;

    const fmt = (s) => {
      if (!isFinite(s)) return '0:00';
      const m = Math.floor(s / 60);
      const ss = Math.floor(s % 60);
      return `${m}:${String(ss).padStart(2, '0')}`;
    };
    const renderTime = () => { timeEl.textContent = `${fmt(v.currentTime)} / ${fmt(v.duration)}`; };
    v.addEventListener('timeupdate', () => {
      if (!seeking && v.duration) seek.value = String(Math.round((v.currentTime / v.duration) * 1000));
      renderTime();
    });
    v.addEventListener('loadedmetadata', () => { renderTime(); postState(); });
    seek.addEventListener('input', () => {
      seeking = true;
      if (v.duration) v.currentTime = (Number(seek.value) / 1000) * v.duration;
    });
    seek.addEventListener('change', () => { seeking = false; });

    muteBtn.addEventListener('click', () => {
      v.muted = !v.muted;
      muteBtn.textContent = v.muted ? '🔇' : '🔊';
      muteBtn.classList.toggle('on', v.muted);
    });
    loopBtn.addEventListener('click', () => {
      v.loop = !v.loop;
      loopBtn.classList.toggle('on', v.loop);
    });

    // 스페이스로 재생/일시정지 (iframe에 포커스가 있을 때).
    document.addEventListener('keydown', (e) => {
      if (e.key === ' ' && document.body.classList.contains('loaded')) { e.preventDefault(); toggle(); }
      if (e.key === 'Escape') setPresent(false);
    });

    // ── 프레젠테이션(수업) 모드 — 부모(보드 카드)에 postMessage로 알려
    //    카드 테두리·헤더도 함께 숨긴다 → 보드 위에 영상만 크게.
    const setPresent = (on) => {
      document.body.classList.toggle('present', on);
      try { window.parent && window.parent.postMessage({ type: 'kv-embed-present', on }, '*'); } catch { /* standalone */ }
    };
    document.getElementById('fs').addEventListener('click', () => setPresent(true));
    document.getElementById('exit').addEventListener('click', () => setPresent(false));

    // 보드 카드가 호버/선택에 맞춰 파일 선택 줄(UI)을 열고 닫는다.
    // 호버 시 현재 상태도 다시 알려, 이미 로드된(이벤트가 지난) 영상도 카드 위
    // 재생 버튼이 곧바로 올바른 아이콘으로 뜨게 한다.
    window.kvSetChrome = (on) => { document.body.classList.toggle('chrome', !!on); postState(); };
    // 보드 카드의 전체 화면 버튼/모션 연결이 프레젠테이션을 켜고 끈다.
    window.kvSetPresent = setPresent;

    // 외부에서 URL로 바로 재생 — 테스트·딥링크 + 생성 영상(data URI) 로드용.
    // data:/blob: URI는 split('/').pop()이 거대한 base64가 되므로 name 인자를 우선 사용.
    window.loadSrc = (u, name) => {
      v.src = u;
      nameEl.textContent = name || (/^(data|blob):/.test(u) ? '영상' : u.split('/').pop());
      document.body.classList.add('loaded');
      postState();
      v.play().catch(() => {});
    };
    const q = new URLSearchParams(location.search).get('src');
    if (q) window.loadSrc(q);
  </script>
</body>
</html>
