<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>동영상 플레이어</title>
<style>
  /* Milray Park 토큰과 동일 값(독립 HTML이라 변수로 복제) — 임의 색 추가 없음 */
  :root {
    --bg: #F8F7F2;
    --bg-deep: #F1EEE6;
    --surface: #FFFFFF;
    --border: #E7E0D4;
    --fg: #141311;
    --fg-2: #56524B;
    --fg-muted: #8C887F;
    --accent: #F2733E;
    --accent-hover: #E5602B;
    --r-md: 14px;
    --r-lg: 20px;
    --r-xl: 26px;
    --r-pill: 999px;
    --shadow-soft: 0 6px 20px rgba(20, 19, 17, 0.14);
    --font-sans: 'Pretendard', 'Hanken Grotesk', -apple-system, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex;
    flex-direction: column;
    font-family: var(--font-sans);
    background: transparent;
    color: var(--fg);
    -webkit-font-smoothing: antialiased;
  }

  /* ── 무대(영상 프레임) ───────────────────────────────────────────
     로드 전엔 카드(surface)처럼, 로드되면 '영상 화면만' 남기고 투명 — 부모 카드가
     영상 비율로 맞춰지므로(카드=프레임) 크롬이 영상 가장자리에 정확히 붙는다. */
  .stage {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
    background: var(--bg-deep);
    overflow: hidden;
  }
  body.loaded .stage { background: transparent; }
  video {
    /* 카드=영상 프레임 — 카드 박스를 꽉 채워 바운드박스와 영상 사이 갭을 없앤다.
       카드 비율은 부모가 영상 비율(kv-video-aspect)에 맞추므로 cover로 크롭되는 양은
       거의 없고, 레터박스(박힌 검정 띠)만 잘려 나간다. */
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: transparent;
    display: none;
    border-radius: var(--r-xl);
  }
  body.loaded video { display: block; }

  /* ── 빈 상태 — 안내 + 파일 선택 ──────────────────────────────── */
  #empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 16px;
    text-align: center;
    color: var(--fg-muted);
    font-size: 13px;
  }
  #empty .clap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    border-radius: var(--r-pill);
    background: var(--surface);
    box-shadow: var(--shadow-soft);
    font-size: 28px;
  }
  body.loaded #empty { display: none; }
  .btn-pick {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border: 0;
    border-radius: var(--r-pill);
    background: var(--accent);
    color: #fff;
    font: 600 13px var(--font-sans);
    cursor: pointer;
  }
  .btn-pick:hover { background: var(--accent-hover); }
  .stage.dropping::after {
    content: '여기에 놓으면 재생돼요';
    position: absolute;
    inset: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px dashed var(--accent);
    border-radius: var(--r-lg);
    background: rgba(255, 255, 255, 0.6);
    color: var(--accent);
    font: 600 13px var(--font-sans);
    pointer-events: none;
  }

  /* ── 상단 헤더 — 제목(좌) + 액션(다른 파일·전체 화면, 우) · 호버/선택 시에만 ── */
  #titlebar {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 6;
    display: none;
    align-items: center;
    gap: 9px;
    max-width: calc(100% - 150px);
    padding: 9px 18px;
    border-radius: var(--r-pill);
    background: rgba(255, 255, 255, 0.92);
    box-shadow: var(--shadow-soft);
    backdrop-filter: blur(6px);
  }
  body.chrome:not(.present) #titlebar { display: inline-flex; }
  #titlebar .dot {
    flex: 0 0 auto;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--accent);
  }
  #titlebar .t {
    font: 600 16px var(--font-sans);
    color: var(--fg);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 240px;
    padding: 2px 4px;
    border-radius: 7px;
    cursor: text;
  }
  #titlebar .t:hover { background: var(--bg-deep); } /* 더블클릭으로 제목 편집 가능 힌트 */
  #titlebar .t[contenteditable='true'] {
    outline: 2px solid var(--accent);
    background: #fff;
    overflow: visible;
    text-overflow: clip;
  }
  #topbar {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 6;
    display: none;
    align-items: center;
    gap: 9px;
  }
  body.chrome:not(.present) #topbar { display: flex; }
  .ic {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 46px;
    height: 46px;
    border: 0;
    border-radius: var(--r-pill);
    background: rgba(255, 255, 255, 0.92);
    color: var(--fg-2);
    cursor: pointer;
    box-shadow: var(--shadow-soft);
    backdrop-filter: blur(6px);
    transition: color 150ms ease, background 150ms ease;
  }
  .ic:hover { color: var(--accent); }
  .ic svg { width: 26px; height: 26px; }

  /* ── 다운로드 — 클릭하면 '내 컴퓨터 / 보관함' 선택 메뉴 ───────────── */
  #dlwrap { position: relative; display: inline-flex; }
  #dlmenu {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 8px;
    display: none;
    flex-direction: column;
    min-width: 188px;
    padding: 6px;
    border-radius: var(--r-md);
    background: rgba(255, 255, 255, 0.98);
    box-shadow: var(--shadow-soft);
    backdrop-filter: blur(8px);
  }
  #dlmenu.open { display: flex; }
  #dlmenu button {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 10px 12px;
    border: 0;
    border-radius: var(--r-md);
    background: transparent;
    color: var(--fg);
    font: 600 14px var(--font-sans);
    text-align: left;
    white-space: nowrap;
    cursor: pointer;
  }
  #dlmenu button:hover { background: var(--bg-deep); color: var(--accent); }
  #dlmenu svg { width: 20px; height: 20px; flex: 0 0 auto; }

  /* ── 중앙 큰 재생 버튼 — 코랄 원 + 흰 삼각형(일시정지 상태에서만) ── */
  #bigPlay {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 66px;
    height: 66px;
    border: 0;
    border-radius: var(--r-pill);
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 22px rgba(20, 19, 17, 0.28);
    transition: background 150ms ease, transform 150ms ease;
  }
  #bigPlay svg { width: 34px; height: 34px; margin-left: 4px; } /* 삼각형 — 크게 + 광학 보정 */
  #bigPlay:hover { background: var(--accent-hover); transform: translate(-50%, -50%) scale(1.06); }
  body.loaded.paused #bigPlay { display: inline-flex; }
  /* 보드 임베드에선 카드 위(드래그 레이어 위) 중앙 버튼이 줌에 맞춰 크기 조절하므로,
     iframe 내부 #bigPlay는 숨겨 이중 표시·고배율에서 뒤로 삐져나오는 링을 막는다. */
  body.no-bigplay #bigPlay { display: none !important; }

  /* ── 하단 컨트롤 바 — 프로스티드 필 ───────────────────────────── */
  #controls {
    position: absolute;
    left: 50%;
    bottom: 16px;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    gap: 14px;
    width: min(calc(100% - 16px), 820px);
    padding: 10px 20px;
    border-radius: var(--r-pill);
    background: rgba(255, 255, 255, 0.94);
    backdrop-filter: blur(8px);
    box-shadow: var(--shadow-soft);
  }
  body.loaded.chrome:not(.present) #controls { display: flex; }
  #controls button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 58px;
    height: 58px;
    flex: 0 0 auto;
    border: 0;
    border-radius: var(--r-pill);
    background: transparent;
    color: var(--fg-2);
    cursor: pointer;
    transition: color 150ms ease, background 150ms ease;
  }
  #controls button:hover { background: var(--bg-deep); color: var(--accent); }
  #controls button.on { color: var(--accent); }
  #controls svg { width: 46px; height: 46px; }
  /* play/pause·mute 아이콘은 body.paused / .on 상태로 CSS가 전환(텍스트 글리프 안 씀) */
  #play .i-pause { display: none; }
  body:not(.paused) #play .i-play { display: none; }
  body:not(.paused) #play .i-pause { display: inline-flex; }
  #mute .i-muted { display: none; }
  #mute.on .i-vol { display: none; }
  #mute.on .i-muted { display: inline-flex; }

  #seek {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    min-width: 0;
    height: 9px;
    border-radius: var(--r-pill);
    cursor: pointer;
    background:
      linear-gradient(var(--accent), var(--accent)) 0 / var(--seek, 0%) 100% no-repeat,
      var(--border);
  }
  #seek::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 40px;               /* 이동(시크) 핸들 — 2배(20→40) */
    height: 40px;
    border-radius: 50%;
    background: var(--accent);
    border: 4px solid #fff;
    box-shadow: 0 2px 5px rgba(20, 19, 17, 0.3);
    cursor: pointer;
  }
  #seek::-moz-range-thumb {
    width: 40px;
    height: 40px;
    border: 4px solid #fff;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 2px 5px rgba(20, 19, 17, 0.3);
    cursor: pointer;
  }
  #time {
    flex: 0 0 auto;
    font-size: 15px;
    font-variant-numeric: tabular-nums;
    color: var(--fg-2);
    white-space: nowrap;
  }

  /* ── 볼륨 — 음소거 버튼 위에 호버 시 세로 슬라이더 팝업 ───────────── */
  #volwrap { position: relative; display: inline-flex; flex: 0 0 auto; }
  #volpop {
    position: absolute;
    bottom: 100%;            /* 버튼과 맞붙여 호버가 끊기지 않게(갭 없음) */
    left: 50%;
    transform: translateX(-50%);
    display: none;
    padding: 16px 12px 12px;
    border-radius: var(--r-lg);
    background: rgba(255, 255, 255, 0.97);
    box-shadow: var(--shadow-soft);
    backdrop-filter: blur(8px);
  }
  #volpop.open { display: block; } /* 표시는 JS가 지연 제어(호버 이탈 시 즉시 안 사라짐) */
  #vol {
    -webkit-appearance: none;
    appearance: none;
    writing-mode: vertical-lr; /* 세로 슬라이더(위=크게) — 모던 표준 */
    direction: rtl;
    width: 9px;                /* 트랙 두께(가로) — 시크바와 동일, 큰 핸들은 넘쳐서 가운데 정렬 */
    height: 120px;             /* 트랙 길이(세로) */
    cursor: pointer;
    border-radius: var(--r-pill);
    background:
      linear-gradient(var(--accent), var(--accent)) bottom / 100% var(--vol, 100%) no-repeat,
      var(--border);
  }
  #vol::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 40px;               /* 볼륨 핸들 — 이동 핸들과 동일하게 2배(작던 기본→40) */
    height: 40px;
    border-radius: 50%;
    background: var(--accent);
    border: 4px solid #fff;
    box-shadow: 0 2px 5px rgba(20, 19, 17, 0.3);
    cursor: pointer;
  }
  #vol::-moz-range-thumb {
    width: 40px;
    height: 40px;
    border: 4px solid #fff;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 2px 5px rgba(20, 19, 17, 0.3);
    cursor: pointer;
  }

  /* ── 네이티브 전체 화면 — 영상 전체를 화면에 contain·검정 배경, 컨트롤 유지 ── */
  #stage:fullscreen { background: #000; }
  #stage:fullscreen video {
    object-fit: contain !important;
    aspect-ratio: auto !important;
    object-position: center !important;
    border-radius: 0;
  }

  /* ── 프레젠테이션(수업) 모드 — 메뉴 숨김 → 보드 위에 영상만 ──────── */
  #exit { position: absolute; top: 10px; right: 10px; display: none; z-index: 10; }
  body.present .stage { background: transparent; }
  body.present #exit { display: inline-flex; }
</style>
</head>
<body class="paused">
  <input id="file" type="file" accept="video/*" hidden />

  <div class="stage" id="stage">
    <video id="v" playsinline loop></video>

    <div id="empty">
      <span class="clap">🎬</span>
      <span>영상을 만들거나 파일을 선택해 재생해요</span>
      <label class="btn-pick" for="file">파일 선택</label>
    </div>

    <!-- 상단 헤더(제목) — 더블클릭하면 인라인 편집 -->
    <div id="titlebar">
      <span class="dot" aria-hidden="true"></span>
      <span class="t" id="vtitle" title="더블클릭하면 제목을 바꿔요">동영상</span>
    </div>

    <!-- 상단 액션 -->
    <div id="topbar">
      <div id="dlwrap">
        <button id="dl" class="ic" type="button" title="동영상 저장" aria-haspopup="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 4v11" /><path d="m7.5 11 4.5 4.5 4.5-4.5" /><path d="M5 20h14" /></svg>
        </button>
        <div id="dlmenu" role="menu">
          <button id="dlDisk" type="button" role="menuitem">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="12" rx="2" /><path d="M8 20h8M12 16v4" /></svg>
            내 컴퓨터에 저장
          </button>
          <button id="dlLib" type="button" role="menuitem">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /></svg>
            보관함에 저장
          </button>
        </div>
      </div>
      <button id="fs" class="ic" type="button" title="전체 화면으로 보기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" /></svg>
      </button>
    </div>

    <!-- 중앙 재생 -->
    <button id="bigPlay" type="button" title="재생">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5.5v13l11-6.5z" /></svg>
    </button>

    <!-- 하단 컨트롤 -->
    <div id="controls">
      <button id="play" type="button" title="재생/일시정지">
        <span class="i-play" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.5v13l11-6.5z" /></svg></span>
        <span class="i-pause" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="6.5" y="5.5" width="3.6" height="13" rx="1.1" /><rect x="13.9" y="5.5" width="3.6" height="13" rx="1.1" /></svg></span>
      </button>
      <input id="seek" type="range" min="0" max="1000" value="0" title="탐색" />
      <span id="time">0:00 / 0:00</span>
      <div id="volwrap">
        <div id="volpop"><input id="vol" type="range" min="0" max="100" value="100" title="볼륨 조절" /></div>
        <button id="mute" type="button" title="음소거">
          <span class="i-vol" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9.5v5h3l5 4V5.5l-5 4H4z" fill="currentColor" stroke="none" /><path d="M16 9a4 4 0 0 1 0 6" /><path d="M18.5 7a7 7 0 0 1 0 10" /></svg></span>
          <span class="i-muted" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9.5v5h3l5 4V5.5l-5 4H4z" fill="currentColor" stroke="none" /><path d="M16.5 9.5l5 5M21.5 9.5l-5 5" /></svg></span>
        </button>
      </div>
      <button id="loop" type="button" title="반복 재생">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m17 2 4 4-4 4" /><path d="M3 11v-1a4 4 0 0 1 4-4h14" /><path d="m7 22-4-4 4-4" /><path d="M21 13v1a4 4 0 0 1-4 4H3" /></svg>
      </button>
    </div>

    <button id="exit" class="ic" type="button" title="프레젠테이션 종료">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18" /></svg>
    </button>
  </div>

  <script>
    const v = document.getElementById('v');
    const file = document.getElementById('file');
    const stage = document.getElementById('stage');
    const playBtn = document.getElementById('play');
    const bigPlay = document.getElementById('bigPlay');
    const seek = document.getElementById('seek');
    const timeEl = document.getElementById('time');
    const muteBtn = document.getElementById('mute');
    const loopBtn = document.getElementById('loop');
    const vol = document.getElementById('vol');
    const volwrap = document.getElementById('volwrap');
    const volpop = document.getElementById('volpop');
    const dlBtn = document.getElementById('dl');
    const dlMenu = document.getElementById('dlmenu');
    const dlDisk = document.getElementById('dlDisk');
    const dlLib = document.getElementById('dlLib');
    const titleEl = document.getElementById('vtitle');
    // 짧은 개념 영상은 기본 '반복'(seamless loop) — 생성 프롬프트가 첫=끝 프레임을 맞추므로
    // 끊김 없이 계속 재생된다. 버튼으로 끌 수 있다(<video loop> 기본 on 반영).
    loopBtn.classList.toggle('on', v.loop);
    let objectUrl = null;
    let seeking = false;

    function loadFile(f) {
      if (!f || !f.type.startsWith('video/')) return;
      if (objectUrl) URL.revokeObjectURL(objectUrl);
      objectUrl = URL.createObjectURL(f);
      resetCrop();
      v.src = objectUrl;
      document.body.classList.add('loaded');
      window.kvSetTitle((f.name || '').replace(/\.[^.]+$/, '')); // 헤더 제목 = 파일명(확장자 제외)
      v.play().catch(() => { /* 자동재생 차단 시 — 중앙 ▶로 시작 */ });
    }
    file.addEventListener('change', (e) => loadFile(e.target.files && e.target.files[0]));

    // 드래그&드롭 — 보드에서 쓰듯 파일을 끌어다 놓으면 바로 재생.
    ['dragenter', 'dragover'].forEach((t) =>
      stage.addEventListener(t, (e) => { e.preventDefault(); stage.classList.add('dropping'); }));
    ['dragleave', 'drop'].forEach((t) =>
      stage.addEventListener(t, (e) => { e.preventDefault(); stage.classList.remove('dropping'); }));
    stage.addEventListener('drop', (e) => loadFile(e.dataTransfer && e.dataTransfer.files[0]));

    /* ── 컨트롤 ── */
    const toggle = () => { if (v.paused) v.play(); else v.pause(); };
    playBtn.addEventListener('click', toggle);
    bigPlay.addEventListener('click', toggle);
    v.addEventListener('click', toggle);
    // 보드 카드(부모)가 재생/일시정지 상태를 알 수 있게 알린다 — 카드 위 '재생/정지'
    // 버튼(드래그 레이어보다 위)이 이 상태로 아이콘을 동기화하고 kvTogglePlay로 조작한다.
    const postState = () => {
      try {
        window.parent && window.parent.postMessage(
          { type: 'kv-video-playing', playing: !v.paused, ready: document.body.classList.contains('loaded') },
          '*',
        );
      } catch { /* standalone */ }
    };
    // 아이콘(▶/⏸)은 body.paused 클래스로 CSS가 전환한다 — 여기선 상태 클래스만 토글.
    v.addEventListener('play', () => { document.body.classList.remove('paused'); postState(); });
    v.addEventListener('pause', () => { document.body.classList.add('paused'); postState(); });
    // 외부(보드 카드)에서 재생/일시정지 토글 — 카드 위 버튼이 호출한다.
    window.kvTogglePlay = toggle;

    /* ── 영상 비율을 부모(보드 카드)에 알려 카드=프레임으로 맞춘다 ──────────
       카드가 영상 비율과 맞으면 좌우/상하 여백이 사라져 크롬이 영상 가장자리에 정확히
       붙고, 라운드 코너·그림자가 곧 영상 프레임이 된다. 크롭이 적용되면 '콘텐츠 비율',
       아니면 원본 비율을 보낸다. 부모는 최초 1회만 반영(videoFitted). */
    function postAspect(a) {
      if (!a || !isFinite(a) || a <= 0) return;
      try { window.parent && window.parent.postMessage({ type: 'kv-video-aspect', aspect: a }, '*'); } catch { /* standalone */ }
    }

    /* ── 레터박스(박힌 검정 띠) 자동 크롭 ──────────────────────────────────
       이미지→비디오는 정사각형 이미지를 16:9로 만들며 좌우(또는 위아래)를 검정으로
       패딩해 mp4에 굽는다. CSS로는 못 지우므로, 첫 프레임을 캔버스로 분석해 검정 띠를
       찾아내고 '콘텐츠 비율'로 object-fit:cover 크롭 → 화면(프레임)만 남긴다.
       검정 띠가 없는 영상은 그대로 둔다(오검출·외부 URL 타이팅 시에도 안전하게 생략). */
    function resetCrop() {
      v.style.aspectRatio = '';
      v.style.objectFit = 'cover'; // 카드 비율을 원본에 맞추므로(아래 postAspect) cover여도 크롭 없음
      v.style.objectPosition = '';
    }
    function cropLetterbox() {
      const VW = v.videoWidth, VH = v.videoHeight;
      if (!VW || !VH) return;
      try {
        const W = 160, H = Math.max(1, Math.round((W * VH) / VW));
        const cv = document.createElement('canvas');
        cv.width = W; cv.height = H;
        const ctx = cv.getContext('2d', { willReadFrequently: true });
        ctx.drawImage(v, 0, 0, W, H);
        const data = ctx.getImageData(0, 0, W, H).data;
        const TH = 18; // 이 값 이하 RGB면 '검정'으로 본다
        const lit = (x, y) => { const i = (y * W + x) * 4; return data[i] > TH || data[i + 1] > TH || data[i + 2] > TH; };
        const colHas = (x) => { for (let y = 0; y < H; y++) if (lit(x, y)) return true; return false; };
        const rowHas = (y) => { for (let x = 0; x < W; x++) if (lit(x, y)) return true; return false; };
        let l = 0; while (l < W && !colHas(l)) l++;
        let r = W - 1; while (r > l && !colHas(r)) r--;
        let t = 0; while (t < H && !rowHas(t)) t++;
        let b = H - 1; while (b > t && !rowHas(b)) b--;
        const cw0 = r - l + 1, ch0 = b - t + 1;
        if (cw0 < W * 0.3 || ch0 < H * 0.3) { resetCrop(); postAspect(VW / VH); return; } // 콘텐츠가 비정상적으로 작으면 무시
        const sideBars = (l + (W - 1 - r)) / W;
        const tbBars = (t + (H - 1 - b)) / H;
        if (sideBars < 0.03 && tbBars < 0.03) { resetCrop(); postAspect(VW / VH); return; } // 띠가 거의 없으면 그대로
        // 잔여 검정 가장자리(경계 1~2px) 제거 — 감지한 콘텐츠 경계를 안쪽으로 ~2%씩
        // 좁혀 cover가 그 띠를 덮게 한다(왼쪽 세로 검정 라인 방지). 손실은 미미하다.
        const insX = Math.max(1, Math.round(W * 0.02));
        const insY = Math.max(1, Math.round(H * 0.02));
        if (r - l > insX * 2) { l += insX; r -= insX; }
        if (b - t > insY * 2) { t += insY; b -= insY; }
        const cw = r - l + 1, ch = b - t + 1;
        const contentAspect = ((cw / W) * VW) / ((ch / H) * VH);
        const cx = (((l + r) / 2) / W) * 100;
        const cy = (((t + b) / 2) / H) * 100;
        v.style.aspectRatio = contentAspect.toFixed(4);
        v.style.objectFit = 'cover';
        v.style.objectPosition = `${cx.toFixed(1)}% ${cy.toFixed(1)}%`;
        postAspect(contentAspect);
      } catch { resetCrop(); postAspect(v.videoWidth / v.videoHeight); /* 외부 URL 캔버스 타이팅 등 — 크롭 생략 */ }
    }
    v.addEventListener('loadeddata', cropLetterbox);
    v.addEventListener('seeked', cropLetterbox);

    const fmt = (s) => {
      if (!isFinite(s)) return '0:00';
      const m = Math.floor(s / 60);
      const ss = Math.floor(s % 60);
      return `${m}:${String(ss).padStart(2, '0')}`;
    };
    const renderTime = () => { timeEl.textContent = `${fmt(v.currentTime)} / ${fmt(v.duration)}`; };
    const renderSeekFill = () => { seek.style.setProperty('--seek', `${(Number(seek.value) / 1000) * 100}%`); };
    v.addEventListener('timeupdate', () => {
      if (!seeking && v.duration) seek.value = String(Math.round((v.currentTime / v.duration) * 1000));
      renderSeekFill();
      renderTime();
    });
    v.addEventListener('loadedmetadata', () => { renderTime(); postState(); });
    seek.addEventListener('input', () => {
      seeking = true;
      renderSeekFill();
      if (v.duration) v.currentTime = (Number(seek.value) / 1000) * v.duration;
    });
    seek.addEventListener('change', () => { seeking = false; });

    muteBtn.addEventListener('click', () => {
      v.muted = !v.muted;
      muteBtn.classList.toggle('on', v.muted);
    });
    // 볼륨 슬라이더(세로) — 음소거 버튼 호버 시 나타난다. 0이면 음소거 상태로 표시.
    // 채움(아래=0)은 --vol(%)로 그린다(커스텀 트랙이라 accent-color 대신 직접).
    const renderVolFill = () => vol.style.setProperty('--vol', `${Number(vol.value)}%`);
    vol.value = String(Math.round((v.volume ?? 1) * 100));
    renderVolFill();
    vol.addEventListener('input', () => {
      const val = Number(vol.value) / 100;
      v.volume = val;
      v.muted = val === 0;
      muteBtn.classList.toggle('on', v.muted);
      renderVolFill();
    });
    // 뷰어 안 팝업(볼륨·다운로드 메뉴)이 열렸음을 부모(보드)에 알린다 — 부모가 이동
    // 손잡이(드래그 레이어)를 통과시켜 팝업이 클리어런스 밖까지 뻗어도 클릭·호버가 닿게 한다.
    function notifyControls() {
      const open = volpop.classList.contains('open') || dlMenu.classList.contains('open');
      try { window.parent && window.parent.postMessage({ type: 'kv-embed-controls', open }, '*'); } catch { /* standalone */ }
    }

    // 팝업 표시는 JS가 지연 제어 — CSS :hover만 쓰면 버튼→슬라이더로 커서를 옮기는 찰나
    // hover가 끊겨 팝업이 사라진다. 진입 시 즉시 열고, 이탈 시 280ms 뒤 닫아 그 틈을 메운다.
    let volTimer = null;
    const openVol = () => { if (volTimer) { clearTimeout(volTimer); volTimer = null; } volpop.classList.add('open'); notifyControls(); };
    const closeVolSoon = () => { if (volTimer) clearTimeout(volTimer); volTimer = setTimeout(() => { volpop.classList.remove('open'); notifyControls(); }, 280); };
    volwrap.addEventListener('mouseenter', openVol);
    volwrap.addEventListener('mouseleave', closeVolSoon);
    volpop.addEventListener('mouseenter', openVol);
    volpop.addEventListener('mouseleave', closeVolSoon);
    loopBtn.addEventListener('click', () => {
      v.loop = !v.loop;
      loopBtn.classList.toggle('on', v.loop);
    });

    // 스페이스로 재생/일시정지 (iframe에 포커스가 있을 때).
    document.addEventListener('keydown', (e) => {
      if (e.key === ' ' && document.body.classList.contains('loaded')) { e.preventDefault(); toggle(); }
      if (e.key === 'Escape') setPresent(false);
    });

    // ── 프레젠테이션(수업) 모드 — 부모(보드 카드)에 postMessage로 알려
    //    카드 테두리·헤더도 함께 숨긴다 → 보드 위에 영상만 크게.
    const setPresent = (on) => {
      document.body.classList.toggle('present', on);
      try { window.parent && window.parent.postMessage({ type: 'kv-embed-present', on }, '*'); } catch { /* standalone */ }
    };
    // ── 전체 화면 — 다른 뷰어 카드와 동일하게 '앱의 풀스크린 오버레이 뷰어'로 연다.
    //    (네이티브 iframe 전체화면은 브라우저·권한 차이로 불안정해 오버레이로 통일.)
    //    부모가 같은 영상을 오버레이 뷰어에 로드한다. 현재 src도 함께 넘겨 파일 재생도 지원.
    function openParentFullscreen() {
      try {
        window.parent && window.parent.postMessage(
          { type: 'kv-embed-fullscreen', src: (v.currentSrc || v.src) || undefined },
          '*',
        );
      } catch { /* standalone */ }
    }
    // 풀스크린 오버레이(?fs=1) 안에서는 같은 버튼이 '닫기(✕)' 역할 — 부모에 kv-fs-exit를
    // 보내 오버레이를 닫는다. 그 외(보드 카드)에서는 풀스크린 오버레이를 연다.
    document.getElementById('fs').addEventListener('click', () => {
      if (new URLSearchParams(location.search).get('fs') === '1') {
        try { window.parent && window.parent.postMessage({ type: 'kv-fs-exit' }, '*'); } catch { /* standalone */ }
      } else {
        openParentFullscreen();
      }
    });
    document.addEventListener('fullscreenchange', () => {
      const on = document.fullscreenElement === stage;
      document.body.classList.toggle('fs', on);
      if (on) document.body.classList.add('chrome'); // 풀스크린에선 헤더·컨트롤 항상 표시
    });

    // ── 다운로드 — 현재 영상을 내 컴퓨터에 저장. 지원 시 저장 위치(폴더) 선택(File System
    //    Access), 아니면 일반 다운로드. data:/blob: 모두 fetch로 Blob화해 저장한다.
    function safeName() {
      const t = ((titleEl && titleEl.textContent) || '동영상').trim() || '동영상';
      return t.replace(/[\\/:*?"<>|]+/g, '_').slice(0, 60);
    }
    async function downloadVideo() {
      const src = v.currentSrc || v.src;
      if (!src) return;
      let blob;
      try { blob = await (await fetch(src)).blob(); } catch { return; }
      const name = safeName() + '.mp4';
      if (window.showSaveFilePicker) {
        try {
          const handle = await window.showSaveFilePicker({
            suggestedName: name,
            types: [{ description: '동영상 (mp4)', accept: { 'video/mp4': ['.mp4'] } }],
          });
          const w = await handle.createWritable();
          await w.write(blob);
          await w.close();
          return;
        } catch (e) {
          if (e && e.name === 'AbortError') return; // 사용자가 취소
          /* iframe 권한 차단 등 → 아래 일반 다운로드로 폴백 */
        }
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 4000);
    }
    // 현재 프레임을 작은 JPEG 포스터로 — 보관함 썸네일용.
    function capturePoster() {
      try {
        const VW = v.videoWidth, VH = v.videoHeight;
        if (!VW || !VH) return undefined;
        const W = 160, H = Math.max(1, Math.round((W * VH) / VW));
        const cv = document.createElement('canvas');
        cv.width = W; cv.height = H;
        const ctx = cv.getContext('2d');
        if (!ctx) return undefined;
        ctx.drawImage(v, 0, 0, W, H);
        return cv.toDataURL('image/jpeg', 0.7);
      } catch { return undefined; }
    }
    // 보관함(이 서비스의 '폴더') 저장 — 부모(보드)가 갤러리 라이브러리에 넣게 영상+포스터+제목 전달.
    async function saveToLibrary() {
      const src = v.currentSrc || v.src;
      if (!src) return;
      let dataUri = src;
      if (!src.startsWith('data:')) {
        try {
          const blob = await (await fetch(src)).blob();
          dataUri = await new Promise((res, rej) => {
            const fr = new FileReader();
            fr.onload = () => res(fr.result);
            fr.onerror = rej;
            fr.readAsDataURL(blob);
          });
        } catch { return; }
      }
      const title = ((titleEl && titleEl.textContent) || '동영상').trim() || '동영상';
      try {
        window.parent && window.parent.postMessage(
          { type: 'kv-video-save-library', dataUri, poster: capturePoster(), title },
          '*',
        );
      } catch { /* standalone */ }
    }

    // 다운로드 버튼 = '내 컴퓨터 / 보관함' 선택 메뉴 토글. 메뉴 밖 클릭 시 닫는다.
    const closeDlMenu = () => { dlMenu.classList.remove('open'); notifyControls(); };
    dlBtn.addEventListener('click', (e) => { e.stopPropagation(); dlMenu.classList.toggle('open'); notifyControls(); });
    document.addEventListener('click', (e) => { if (!dlBtn.contains(e.target) && !dlMenu.contains(e.target)) closeDlMenu(); });
    dlDisk.addEventListener('click', () => { closeDlMenu(); downloadVideo(); });
    dlLib.addEventListener('click', () => { closeDlMenu(); saveToLibrary(); });

    document.getElementById('exit').addEventListener('click', () => setPresent(false));

    // 보드 카드가 호버/선택에 맞춰 컨트롤을 열고 닫는다. 호버 시 현재 상태도 다시 알려,
    // 이미 로드된(이벤트가 지난) 영상도 카드 위 재생 버튼이 곧바로 올바른 아이콘으로 뜨게 한다.
    window.kvSetChrome = (on) => { document.body.classList.toggle('chrome', !!on); postState(); };
    // 보드 카드의 전체 화면 버튼/모션 연결이 프레젠테이션을 켜고 끈다.
    window.kvSetPresent = setPresent;

    // 외부에서 URL로 바로 재생 — 테스트·딥링크 + 생성 영상(data URI) 로드용.
    // name이 오면 헤더 제목으로(생성 영상=핵심주제, 복원 시 카드 제목).
    window.loadSrc = (u, name) => {
      resetCrop();
      v.src = u;
      document.body.classList.add('loaded');
      if (name) window.kvSetTitle(name);
      postState();
      v.play().catch(() => {});
    };

    // ── 상단 헤더 제목 — ?title= 쿼리로 주입(부모가 카드 제목을 넘긴다). 외부에서
    //    kvSetTitle로도 바꿀 수 있다. 비면 기본 '동영상'.
    window.kvSetTitle = (t) => {
      if (titleEl && typeof t === 'string' && t.trim() && titleEl.getAttribute('contenteditable') !== 'true') {
        titleEl.textContent = t.trim();
      }
    };
    const qs = new URLSearchParams(location.search);
    window.kvSetTitle(qs.get('title'));
    // 전체 화면 오버레이(?fs=1) — 컨트롤 항상 표시. 우상단의 전체화면 버튼(#fs)을 '닫기(✕)'
    // 버튼으로 바꿔(아이콘·툴팁) 오버레이를 닫게 하고, 다운로드 버튼은 숨겨 우상단에 ✕ 하나만 둔다.
    const fsMode = qs.get('fs') === '1';
    if (fsMode) {
      document.body.classList.add('chrome');
      const fsb = document.getElementById('fs');
      if (fsb) {
        fsb.title = '닫기 (Esc)';
        fsb.innerHTML =
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>';
      }
      const dw = document.getElementById('dlwrap');
      if (dw) dw.style.display = 'none';
    }
    // 보드 카드 임베드(iframe, 비-전체화면) — 카드 위 중앙 버튼이 줌에 맞춰 크기를 조절하므로
    // iframe 내부 #bigPlay는 숨긴다(전체화면/단독 실행에선 그대로 #bigPlay 사용).
    if (window.parent !== window && !fsMode) document.body.classList.add('no-bigplay');

    // ── 제목 인라인 편집 — 더블클릭하면 편집, Enter 또는 포커스 해제로 확정. 확정 시
    //    부모(보드)에 알려 카드 제목(node.data.title)으로 영속화한다(새로고침에도 유지).
    function commitTitle() {
      titleEl.removeAttribute('contenteditable');
      const t = (titleEl.textContent || '').replace(/\s+/g, ' ').trim().slice(0, 60) || '동영상';
      titleEl.textContent = t;
      try { window.parent && window.parent.postMessage({ type: 'kv-video-title', title: t }, '*'); } catch { /* standalone */ }
    }
    titleEl.addEventListener('dblclick', () => {
      titleEl.setAttribute('contenteditable', 'true');
      titleEl.focus();
      const r = document.createRange();
      r.selectNodeContents(titleEl);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(r);
    });
    titleEl.addEventListener('keydown', (e) => {
      e.stopPropagation(); // 스페이스(재생토글)·Esc(프레젠테이션 종료)로 새지 않게
      if (e.key === 'Enter' || e.key === 'Escape') { e.preventDefault(); titleEl.blur(); }
    });
    titleEl.addEventListener('blur', commitTitle);

    const q = qs.get('src');
    if (q) window.loadSrc(q);
  </script>
</body>
</html>
