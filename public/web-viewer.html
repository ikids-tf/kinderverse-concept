<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>웹 뷰어</title>
<style>
  /* Milray Park 토큰과 동일 값(독립 HTML이라 변수로 복제) — 임의 색 추가 없음 */
  :root {
    --bg: #F8F7F2;
    --bg-deep: #F1EEE6;
    --surface: #FFFFFF;
    --border: #E7E0D4;
    --fg: #141311;
    --fg-2: #56524B;
    --fg-muted: #8C887F;
    --accent: #F2733E;
    --accent-hover: #E5602B;
    --font-sans: 'Pretendard', 'Hanken Grotesk', -apple-system, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex;
    flex-direction: column;
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--fg);
  }

  /* ── 상단 주소 바 — 평소엔 숨김(보드에선 화면만). 카드가 호버/선택 시 kvSetChrome으로 연다. ── */
  header {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  body.chrome:not(.present) header { display: flex; }
  #addr {
    flex: 1;
    min-width: 0;
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--bg);
    color: var(--fg-2);
    font: 400 12px var(--font-sans);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .icon-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--surface);
    color: var(--fg-2);
    cursor: pointer;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn svg { width: 17px; height: 17px; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex: 0 0 auto;
    padding: 7px 13px;
    border: 0;
    border-radius: 999px;
    background: var(--accent);
    color: #fff;
    font: 600 12px var(--font-sans);
    text-decoration: none;
    white-space: nowrap;
    cursor: pointer;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn svg { width: 15px; height: 15px; }

  /* ── 무대: 웹페이지 iframe ── */
  .stage { position: relative; flex: 1; display: flex; min-height: 0; background: var(--bg-deep); }
  body.present .stage { background: transparent; }
  iframe#web {
    flex: 1;
    width: 100%;
    height: 100%;
    border: 0;
    display: none;
    background: var(--surface);
  }
  body.loaded #web { display: block; }

  /* 빈 상태 */
  #empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--fg-muted);
    font-size: 13px;
    text-align: center;
    padding: 0 18px;
    pointer-events: none;
  }
  body.loaded #empty { display: none; }
  #empty .globe { font-size: 34px; }
  #empty .title { font-weight: 700; font-size: 14px; color: var(--fg-2); }

  /* 차단 안내(폴백) — 사이트가 iframe을 막으면 빈 화면일 수 있어, 새 탭 열기를 안내. */
  #blocked {
    position: absolute;
    left: 50%;
    bottom: 12px;
    transform: translateX(-50%);
    z-index: 8;
    display: none;
    align-items: center;
    gap: 8px;
    max-width: calc(100% - 24px);
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.96);
    box-shadow: 0 4px 14px rgba(20, 19, 17, 0.1);
    color: var(--fg-2);
    font-size: 12px;
  }
  body.loaded.chrome:not(.present) #blocked { display: inline-flex; }

  /* ── 프레젠테이션(수업·모션 연결) — 메뉴 숨김 + 배경 투명 → 보드 위에 화면만 ── */
  #exit { position: absolute; top: 8px; right: 8px; display: none; z-index: 10; opacity: 0.55; }
  #exit:hover { opacity: 1; }
  body.present { background: transparent; }
  body.present header { display: none; }
  body.present #exit { display: inline-flex; }

  /* ── 풀스크린(보드 오버레이, ?fs) — 마우스가 1.5초 멈추면 상단 UI 페이드 ── */
  body.fs header { transition: opacity 300ms ease; }
  body.fs.fs-idle header,
  body.fs.fs-idle #fsExit { opacity: 0; pointer-events: none; }
  #fsExit {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 20;
    display: none;
    width: 40px;
    height: 40px;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--surface);
    color: var(--fg-2);
    cursor: pointer;
    opacity: 1;
    transition: opacity 300ms ease;
  }
  body.fs #fsExit { display: inline-flex; }
  #fsExit:hover { border-color: var(--accent); color: var(--accent); }
  #fsExit svg { width: 18px; height: 18px; }
</style>
</head>
<body class="mode-empty">
  <header>
    <button id="back" class="icon-btn" type="button" title="새로고침">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
    </button>
    <span id="addr" title="">웹 자료</span>
    <a id="open" class="btn" target="_blank" rel="noreferrer noopener" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="m10 14 11-11"/></svg>
      새 탭에서 열기
    </a>
  </header>

  <div class="stage" id="stage">
    <iframe
      id="web"
      title="웹 자료"
      referrerpolicy="no-referrer-when-downgrade"
      allow="fullscreen; autoplay; clipboard-write; encrypted-media; picture-in-picture"
    ></iframe>

    <div id="empty">
      <span class="globe">🌐</span>
      <span class="title">웹 뷰어</span>
      <span>웹 자료 카드의 자료를 누르면 여기에서 바로 열려요</span>
    </div>

    <span id="blocked">
      이 사이트가 미리보기를 막았을 수 있어요 —
      <a id="blockedOpen" class="btn" target="_blank" rel="noreferrer noopener" href="#" style="padding:4px 10px">새 탭에서 열기</a>
    </span>

    <button id="exit" class="icon-btn" type="button" title="프레젠테이션 종료">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg>
    </button>
  </div>

  <button id="fsExit" type="button" title="전체 화면 종료 (Esc)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg>
  </button>

  <script>
    /* 웹 뷰어 — 외부 웹페이지를 iframe으로 보드 카드 안에 띄운다. 보드 카드 계약(kvSetChrome ·
       kvSetPresent · loadSrc · kv-embed-drag · ?fs · ?src · ?title)은 다른 뷰어와 동일.
       ※ 일부 사이트는 X-Frame-Options/CSP로 iframe을 막아 빈 화면이 될 수 있어, 항상 '새 탭에서
         열기'(폴백)를 chrome 헤더에 둔다. */
    const web = document.getElementById('web');
    const addrEl = document.getElementById('addr');
    const openEl = document.getElementById('open');
    const blockedOpen = document.getElementById('blockedOpen');
    let currentUrl = '';

    function normalize(raw) {
      const s = (raw || '').trim();
      if (!s) return '';
      if (/^https?:\/\//i.test(s)) return s;
      if (/^[\w.-]+\.[a-z]{2,}(\/|$)/i.test(s)) return `https://${s}`;
      return s;
    }
    function hostOf(u) { try { return new URL(u).hostname.replace(/^www\./, ''); } catch { return u; } }

    /** 외부에서 바로 열기 — 카드/딥링크가 호출. */
    window.loadSrc = (u) => {
      const url = normalize(u);
      if (!url) return;
      currentUrl = url;
      web.src = url;
      addrEl.textContent = hostOf(url);
      addrEl.title = url;
      openEl.href = url;
      blockedOpen.href = url;
      document.body.classList.add('loaded');
      try { window.parent?.postMessage({ type: 'kv-viewer-content', mode: 'web', src: url }, '*'); } catch { /* standalone */ }
    };

    document.getElementById('back').addEventListener('click', () => { if (currentUrl) web.src = currentUrl; });

    /* ── 보드 카드 계약 ─────────────────────────────────────────── */
    const setPresent = (on) => {
      document.body.classList.toggle('present', on);
      try { window.parent?.postMessage({ type: 'kv-embed-present', on }, '*'); } catch { /* standalone */ }
    };
    document.getElementById('exit').addEventListener('click', () => setPresent(false));
    window.kvSetPresent = setPresent;
    window.kvSetChrome = (on) => document.body.classList.toggle('chrome', !!on);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') setPresent(false); });

    // ── 카드 이동 — 헤더(상단)의 '빈 곳'을 끌면 부모 카드가 움직인다.
    (function initCardDrag() {
      let dragging = false;
      const isHandle = (t) => {
        const onBar = t && t.closest('header');
        if (!onBar) return false;
        return !t.closest('button') && !t.closest('a') && !t.closest('input');
      };
      const post = (phase, e) => {
        try { window.parent?.postMessage({ type: 'kv-embed-drag', phase, sx: e?.screenX, sy: e?.screenY }, '*'); } catch { /* standalone */ }
      };
      document.addEventListener('pointerdown', (e) => {
        if (!isHandle(e.target)) return;
        dragging = true;
        post('start', e);
        e.preventDefault();
        try { e.target.setPointerCapture?.(e.pointerId); } catch { /* 무시 */ }
      });
      document.addEventListener('pointermove', (e) => { if (dragging) post('move', e); }, { passive: true });
      const end = () => { if (dragging) { dragging = false; post('end'); } };
      document.addEventListener('pointerup', end);
      document.addEventListener('pointercancel', end);
    })();

    // ── 풀스크린(보드 오버레이, ?fs) — UI 켜고, 1.5초 무동작이면 페이드아웃.
    const params = new URLSearchParams(location.search);
    if (params.has('fs')) {
      document.body.classList.add('fs', 'chrome');
      let idleT = null;
      const bump = () => {
        document.body.classList.remove('fs-idle');
        clearTimeout(idleT);
        idleT = setTimeout(() => document.body.classList.add('fs-idle'), 1500);
      };
      document.addEventListener('pointermove', bump, { passive: true });
      document.addEventListener('pointerdown', bump, { passive: true });
      document.getElementById('fsExit').addEventListener('click', () => {
        try { window.parent?.postMessage({ type: 'kv-fs-exit' }, '*'); } catch { /* standalone */ }
      });
      bump();
    }

    // 초기 제목·내용 — ?title=(헤더 표시) · ?src=(웹 주소)로 바로 연다.
    const t = params.get('title');
    if (t) addrEl.textContent = t;
    const q = params.get('src');
    if (q) window.loadSrc(q);
  </script>
</body>
</html>
