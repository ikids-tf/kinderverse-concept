  <rect width="192" height="128" fill="url(#mn-bg)"/>
  <!-- plate -->
  <circle cx="84" cy="64" r="40" fill="#FFFFFF" stroke="#E7E0D4"/>
  <circle cx="84" cy="64" r="29" fill="none" stroke="#EFE7DA" stroke-width="2"/>
  <circle cx="74" cy="56" r="11" fill="#F2733E"/>
  <circle cx="96" cy="54" r="8" fill="#FFC324"/>
  <circle cx="90" cy="74" r="9" fill="#2E7D5B" opacity="0.8"/>
