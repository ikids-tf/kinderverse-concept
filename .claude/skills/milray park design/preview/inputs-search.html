<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:var(--font-sans);background:var(--bg);color:var(--fg);
  padding:22px 26px;-webkit-font-smoothing:antialiased;}
.row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:14px}
.lab{font-size:12px;font-weight:600;letter-spacing:.04em;color:var(--fg-muted);text-transform:uppercase;margin:0 0 14px}
.cap{font-size:11px;color:var(--fg-muted);margin-top:7px;font-weight:500}
svg{display:block}
/* ---- buttons ---- */
.btn{font-family:var(--font-sans);font-weight:600;font-size:15px;border:none;cursor:pointer;
  border-radius:var(--r-pill);padding:13px 26px;display:inline-flex;align-items:center;gap:8px;transition:.16s}
.btn-dark{background:var(--ink);color:#fff}
.btn-dark:hover{background:#2c2a26}
.btn-outline{background:#fff;color:var(--ink);box-shadow:inset 0 0 0 1.5px var(--ink)}
.btn-tan{background:var(--tan-1);color:var(--ink)}
.btn-tan:hover{background:var(--tan-2)}
.btn-sm{padding:10px 20px;font-size:14px}
.icon-btn{width:46px;height:46px;border-radius:var(--r-pill);border:none;cursor:pointer;
  background:var(--tan-1);color:var(--ink);display:inline-flex;align-items:center;justify-content:center;transition:.16s}
.icon-btn:hover{background:var(--tan-2)}
/* ---- tags / badges ---- */
.tag{font-family:var(--font-sans);font-weight:600;font-size:13.5px;border:none;cursor:pointer;
  border-radius:var(--r-pill);padding:9px 18px;display:inline-flex;align-items:center;gap:7px;background:var(--tan-2);color:var(--ink-soft)}
.tag.active{background:var(--coral);color:#fff}
.tag.ghost{background:#fff;color:var(--ink-soft);box-shadow:inset 0 0 0 1.5px var(--tan-3)}
.badge{font-family:var(--font-sans);font-weight:700;font-size:10.5px;letter-spacing:.12em;white-space:nowrap;text-transform:uppercase;
  background:var(--tan-1);color:var(--ink-2);padding:6px 11px;border-radius:6px;display:inline-flex;align-items:center}
.badge.gold{background:var(--gold);color:#5a4410}
/* ---- swatches ---- */
.sw{display:flex;flex-direction:column;gap:0;border-radius:12px;overflow:hidden;min-width:96px;box-shadow:var(--shadow-xs)}
.sw .chip{height:62px}
.sw .meta{background:#fff;padding:8px 10px;border:1px solid var(--sand-line);border-top:none;border-radius:0 0 12px 12px}
.sw .nm{font-size:12px;font-weight:600;color:var(--fg-1)}
.sw .hx{font-size:11px;color:var(--fg-muted);font-variant-numeric:tabular-nums;margin-top:1px}
/* ---- form ---- */
.search{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--ink);
  border-radius:var(--r-pill);padding:12px 16px;color:var(--ink);font-size:15px;min-width:280px}
.search input{border:none;outline:none;font-family:var(--font-sans);font-size:15px;flex:1;background:transparent;color:var(--ink)}
.search input::placeholder{color:var(--ink-3)}
.select{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--tan-1);
  border:1px solid var(--field-border);border-radius:10px;padding:13px 16px;color:var(--ink-3);font-size:14px;min-width:220px}
.chk{width:22px;height:22px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.chk.on{background:var(--ink);color:#fff}
.chk.off{background:#fff;box-shadow:inset 0 0 0 1.5px var(--tan-3)}
.chk.dis{background:var(--tan-1);box-shadow:inset 0 0 0 1.5px var(--tan-2);color:var(--ink-4)}
.rad{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:inset 0 0 0 1.5px var(--tan-3);background:#fff}
.rad.on{box-shadow:inset 0 0 0 2px var(--ink)}
.rad.on::after{content:"";width:10px;height:10px;border-radius:50%;background:var(--ink)}
.rad.dis{box-shadow:inset 0 0 0 1.5px var(--tan-2);background:var(--tan-1)}
.rad.dis.on::after{background:var(--ink-4)}
.opt{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--ink-soft)}
.opt.muted{color:var(--ink-4)}
/* ---- check circle motif ---- */
.tick{width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
</style></head><body><div><div class="lab">Search inputs</div><div class="col" style="gap:12px">
  <div class="search" style="max-width:440px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input placeholder="Search for Desktops" readonly><span class="tag" style="padding:7px 14px">Budget <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span></div>
  <div class="row"><div class="search" style="min-width:300px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input placeholder="Search for Mobiles" readonly></div><button class="icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M6 12h12M10 18h4"/></svg></button></div>
</div></div></body></html>
